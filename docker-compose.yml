services:
  database:
    image: postgres:15-alpine
    container_name: lms-db-container
    environment:
      - POSTGRES_DB=lms_db
      - POSTGRES_USER=dev_user
      - POSTGRES_PASSWORD=123456
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev_user -d lms_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  backend-app:
    build: .
    container_name: lms-app-container
    ports:
      - "8888:8888"
    depends_on:
      database:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=database
      - DB_PORT=5432
      - SPRING_DATASOURCE_URL=jdbc:postgresql://database:5432/lms_db
      - SPRING_DATASOURCE_USERNAME=dev_user
      - SPRING_DATASOURCE_PASSWORD=123456
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
